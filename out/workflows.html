<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workflow Templates — LM Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            dark: { 900: '#0a0a0f', 800: '#12121a', 700: '#1a1a25', 600: '#242430' },
            accent: { DEFAULT: '#ff6d5a', light: '#ff8a7a' },
            blue: { DEFAULT: '#3b82f6', light: '#60a5fa' }
          }
        }
      }
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0a0a0f; color: #e5e5e5; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #12121a; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(255,109,90,0.1); }
    .tag-active { background: #ff6d5a; color: white; }
    .search-glow:focus { box-shadow: 0 0 0 2px rgba(255,109,90,0.3); }
  </style>
</head>
<body>
  <!-- NAV -->
  <nav class="fixed top-0 left-0 right-0 z-50 bg-dark-900/90 backdrop-blur-md border-b border-white/5">
    <div class="max-w-7xl mx-auto px-5 flex items-center justify-between h-16">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-accent flex items-center justify-center text-white font-bold text-sm">LM</div>
        <span class="font-semibold text-white">LM Studio</span>
      </div>
      <div class="hidden md:flex items-center gap-6">
        <a href="#" class="text-sm text-gray-400 hover:text-white transition-colors">Templates</a>
        <a href="#" class="text-sm text-gray-400 hover:text-white transition-colors">Integrations</a>
        <a href="#" class="text-sm text-gray-400 hover:text-white transition-colors">Docs</a>
        <a href="#" class="px-4 py-2 rounded-lg text-sm font-medium bg-accent text-white hover:bg-accent-light transition-colors">Get Started</a>
      </div>
    </div>
  </nav>

  <!-- HERO -->
  <section class="pt-28 pb-12 px-5">
    <div class="max-w-4xl mx-auto text-center">
      <h1 class="text-4xl md:text-5xl font-bold text-white mb-4">Workflow Templates</h1>
      <p class="text-gray-400 text-lg mb-8">Pilih template workflow yang sudah jadi — tinggal pakai, gak perlu bikin dari awal.</p>
      
      <!-- SEARCH -->
      <div class="relative max-w-2xl mx-auto">
        <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        <input type="text" id="searchInput" placeholder="Search templates..." class="w-full pl-12 pr-4 py-3.5 bg-dark-700 border border-white/10 rounded-xl text-white placeholder-gray-500 focus:outline-none search-glow transition-all">
      </div>
    </div>
  </section>

  <!-- FILTERS + GRID -->
  <section class="px-5 pb-20">
    <div class="max-w-7xl mx-auto flex flex-col lg:flex-row gap-8">
      
      <!-- SIDEBAR -->
      <aside class="lg:w-56 flex-shrink-0">
        <div class="sticky top-24 space-y-6">
          <div>
            <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">Categories</h3>
            <div class="space-y-1" id="categories">
              <button onclick="filterCategory('all')" class="filter-btn w-full text-left px-3 py-2 rounded-lg text-sm text-gray-300 hover:bg-dark-700 transition-colors tag-active" data-cat="all">All Templates</button>
              <button onclick="filterCategory('ai')" class="filter-btn w-full text-left px-3 py-2 rounded-lg text-sm text-gray-300 hover:bg-dark-700 transition-colors" data-cat="ai">🤖 AI & LLM</button>
              <button onclick="filterCategory('email')" class="filter-btn w-full text-left px-3 py-2 rounded-lg text-sm text-gray-300 hover:bg-dark-700 transition-colors" data-cat="email">📧 Email</button>
              <button onclick="filterCategory('crm')" class="filter-btn w-full text-left px-3 py-2 rounded-lg text-sm text-gray-300 hover:bg-dark-700 transition-colors" data-crm="crm">📊 CRM</button>
              <button onclick="filterCategory('social')" class="filter-btn w-full text-left px-3 py-2 rounded-lg text-sm text-gray-300 hover:bg-dark-700 transition-colors" data-cat="social">📱 Social Media</button>
              <button onclick="filterCategory('data')" class="filter-btn w-full text-left px-3 py-2 rounded-lg text-sm text-gray-300 hover:bg-dark-700 transition-colors" data-cat="data">💾 Database</button>
              <button onclick="filterCategory('payment')" class="filter-btn w-full text-left px-3 py-2 rounded-lg text-sm text-gray-300 hover:bg-dark-700 transition-colors" data-cat="payment">💳 Payment</button>
            </div>
          </div>
          <div>
            <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">Status</h3>
            <div class="space-y-1">
              <button class="w-full text-left px-3 py-2 rounded-lg text-sm text-gray-300 hover:bg-dark-700 transition-colors">🟢 Active</button>
              <button class="w-full text-left px-3 py-2 rounded-lg text-sm text-gray-300 hover:bg-dark-700 transition-colors">🟡 Beta</button>
            </div>
          </div>
        </div>
      </aside>

      <!-- GRID -->
      <div class="flex-1">
        <div class="flex items-center justify-between mb-6">
          <p class="text-sm text-gray-500"><span id="count">12</span> templates</p>
          <select class="bg-dark-700 border border-white/10 rounded-lg px-3 py-2 text-sm text-gray-300 focus:outline-none">
            <option>Most Popular</option>
            <option>Newest</option>
            <option>A-Z</option>
          </select>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-4" id="grid">
          <!-- Cards injected by JS -->
        </div>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="border-t border-white/5 py-8 px-5">
    <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
      <p class="text-gray-600 text-sm">© 2026 LM Studio. All rights reserved.</p>
      <div class="flex items-center gap-4">
        <a href="#" class="text-gray-500 hover:text-white text-sm transition-colors">Instagram</a>
        <a href="#" class="text-gray-500 hover:text-white text-sm transition-colors">WhatsApp</a>
      </div>
    </div>
  </footer>

  <script>
    const templates = [
      { name: "Auto-Reply Email dengan AI", desc: "Balas email otomatis pakai GPT berdasarkan konten email masuk.", cat: "ai", tags: ["OpenAI", "Gmail"], pop: 1240, icon: "🤖" },
      { name: "Lead Masuk → Google Sheets", desc: "Setiap lead baru dari form langsung masuk spreadsheet.", cat: "data", tags: ["Forms", "Sheets"], pop: 890, icon: "📊" },
      { name: "Instagram Post → WhatsApp Notif", desc: "Kirim notif ke WA team setiap ada post baru di IG.", cat: "social", tags: ["Instagram", "WhatsApp"], pop: 2100, icon: "📱" },
      { name: "Invoice Otomatis → Email", desc: "Generate PDF invoice dari database, kirim via email.", cat: "email", tags: ["PDF", "Email"], pop: 670, icon: "📧" },
      { name: "Customer Baru → CRM", desc: "Tambah contact baru ke CRM otomatis dari WhatsApp.", cat: "crm", tags: ["WhatsApp", "CRM"], pop: 1500, icon: "👥" },
      { name: "AI Summarize Article", desc: "Ringkas artikel panjang jadi bullet points pakai LLM.", cat: "ai", tags: ["LLM", "Scraping"], pop: 3200, icon: "📝" },
      { name: "Payment Success → Notif", desc: "Kirim notif ke Slack/WA saat pembayaran berhasil.", cat: "payment", tags: ["Stripe", "WhatsApp"], pop: 980, icon: "💳" },
      { name: "Scrape & Store Data", desc: "Scrape website target, simpan data ke database.", cat: "data", tags: ["Scraper", "Database"], pop: 1100, icon: "💾" },
      { name: "Social Media Scheduler", desc: "Jadwalkan post otomatis ke beberapa platform sekaligus.", cat: "social", tags: ["Instagram", "Twitter"], pop: 2800, icon: "📅" },
      { name: "Chatbot WhatsApp AI", desc: "Jawab pertanyaan customer pakai AI via WhatsApp.", cat: "ai", tags: ["WhatsApp", "GPT"], pop: 4500, icon: "💬" },
      { name: "Welcome Email Sequence", desc: "Kirim series welcome email otomatis untuk subscriber baru.", cat: "email", tags: ["Email", "Sequence"], pop: 760, icon: "📬" },
      { name: "Deal Stage Notifier", desc: "Notifikasi otomatis saat deal pindah stage di CRM.", cat: "crm", tags: ["CRM", "Notifikasi"], pop: 540, icon: "🔔" },
    ];

    let currentCat = 'all';

    function renderGrid(filter = 'all', search = '') {
      const grid = document.getElementById('grid');
      const filtered = templates.filter(t => {
        const matchCat = filter === 'all' || t.cat === filter;
        const matchSearch = search === '' || t.name.toLowerCase().includes(search) || t.desc.toLowerCase().includes(search) || t.tags.some(tag => tag.toLowerCase().includes(search));
        return matchCat && matchSearch;
      });
      
      document.getElementById('count').textContent = filtered.length;
      
      grid.innerHTML = filtered.map(t => `
        <div class="bg-dark-800 border border-white/5 rounded-xl p-5 card-hover transition-all duration-300 cursor-pointer group">
          <div class="flex items-start gap-3 mb-3">
            <span class="text-2xl">${t.icon}</span>
            <div class="flex-1 min-w-0">
              <h3 class="font-semibold text-white text-sm leading-snug group-hover:text-accent transition-colors">${t.name}</h3>
            </div>
          </div>
          <p class="text-gray-500 text-xs leading-relaxed mb-4">${t.desc}</p>
          <div class="flex items-center justify-between">
            <div class="flex gap-1.5 flex-wrap">
              ${t.tags.map(tag => `<span class="px-2 py-0.5 bg-dark-600 rounded text-[10px] text-gray-400">${tag}</span>`).join('')}
            </div>
            <span class="text-[10px] text-gray-600">${t.pop.toLocaleString()} uses</span>
          </div>
        </div>
      `).join('');
    }

    function filterCategory(cat) {
      currentCat = cat;
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('tag-active', btn.dataset.cat === cat);
      });
      renderGrid(cat, document.getElementById('searchInput').value.toLowerCase());
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
      renderGrid(currentCat, e.target.value.toLowerCase());
    });

    renderGrid();
  </script>
</body>
</html>
